<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: {{PRIMARY_COLOR}};
      --bg: {{BG_COLOR}};
      --text: {{TEXT_COLOR}};
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; }
    .btn-primary { background: var(--primary); color: white; }
    input:focus, textarea:focus { border-color: var(--primary); outline: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-xl w-full bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-3xl font-bold mb-2">{{TITLE}}</h1>
    <p class="opacity-70 mb-8">{{DESCRIPTION}}</p>

    <form id="appForm" class="space-y-5">
      {{ITEMS}}
      <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold hover:opacity-90 transition">
        送信する
      </button>
    </form>

    <div id="result" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800">
      ✓ 送信しました。ありがとうございます！
    </div>
  </div>

  <script>
    document.getElementById('appForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      const saved = JSON.parse(localStorage.getItem('submissions') || '[]');
      saved.push({ ...data, at: new Date().toISOString() });
      localStorage.setItem('submissions', JSON.stringify(saved));
      document.getElementById('result').classList.remove('hidden');
      e.target.reset();
    });
  </script>
</body>
</html>
