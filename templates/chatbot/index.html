<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: {{PRIMARY_COLOR}};
      --bg: {{BG_COLOR}};
      --text: {{TEXT_COLOR}};
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; }
    .btn-primary { background: var(--primary); color: white; }
    .msg-user { background: var(--primary); color: white; align-self: flex-end; }
    .msg-bot { background: #f0f0f0; color: #111; align-self: flex-start; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-2xl h-[80vh] bg-white rounded-2xl shadow-lg flex flex-col overflow-hidden">
    <header class="p-4 border-b">
      <h1 class="font-bold text-lg">{{TITLE}}</h1>
      <p class="text-sm opacity-70">{{DESCRIPTION}}</p>
    </header>

    <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3">
      <div class="msg-bot px-4 py-2 rounded-2xl max-w-[80%]">
        こんにちは！何でも聞いてください 😊
      </div>
    </div>

    <form id="chatForm" class="p-4 border-t flex gap-2">
      <input
        type="text"
        id="input"
        placeholder="メッセージを入力..."
        class="flex-1 px-4 py-2 border rounded-full focus:outline-none"
        required
      >
      <button type="submit" class="btn-primary px-6 py-2 rounded-full font-semibold">
        送信
      </button>
    </form>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('chatForm');
    const input = document.getElementById('input');

    const fakeReply = (text) => {
      const responses = [
        `「${text}」について、もう少し詳しく教えてください！`,
        `なるほど、「${text}」ですね。承知しました。`,
        `「${text}」に関する情報をお調べします…`,
        `面白いご質問ですね！「${text}」について考えてみます。`
      ];
      return responses[Math.floor(Math.random() * responses.length)];
    };

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      const userMsg = document.createElement('div');
      userMsg.className = 'msg-user px-4 py-2 rounded-2xl max-w-[80%]';
      userMsg.textContent = text;
      messages.appendChild(userMsg);
      input.value = '';
      messages.scrollTop = messages.scrollHeight;

      setTimeout(() => {
        const botMsg = document.createElement('div');
        botMsg.className = 'msg-bot px-4 py-2 rounded-2xl max-w-[80%]';
        botMsg.textContent = fakeReply(text);
        messages.appendChild(botMsg);
        messages.scrollTop = messages.scrollHeight;
      }, 600);
    });
  </script>
</body>
</html>
