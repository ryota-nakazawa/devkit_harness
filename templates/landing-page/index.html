<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: {{PRIMARY_COLOR}};
      --bg: {{BG_COLOR}};
      --text: {{TEXT_COLOR}};
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; }
    .btn-primary { background: var(--primary); color: white; }
    .accent { color: var(--primary); }
  </style>
</head>
<body class="min-h-screen">
  <header class="py-6 px-8 flex justify-between items-center">
    <div class="font-bold text-xl">{{TITLE}}</div>
    <nav class="space-x-6 text-sm">
      <a href="#about" class="hover:underline">特徴</a>
      <a href="#items" class="hover:underline">詳細</a>
      <a href="#contact" class="hover:underline">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <section class="text-center py-24 px-6">
      <h1 class="text-5xl font-bold mb-6">{{TITLE}}</h1>
      <p class="text-xl opacity-80 max-w-2xl mx-auto mb-8">{{DESCRIPTION}}</p>
      <button class="btn-primary px-8 py-3 rounded-full font-semibold hover:opacity-90 transition">
        詳しく見る
      </button>
    </section>

    <section id="items" class="py-16 px-8 max-w-4xl mx-auto">
      <h2 class="text-3xl font-bold mb-8 text-center">
        <span class="accent">●</span> こだわり
      </h2>
      <div class="grid md:grid-cols-3 gap-6">
        {{ITEMS}}
      </div>
    </section>

    <section id="contact" class="py-16 px-8 text-center">
      <h2 class="text-3xl font-bold mb-4">お問い合わせ</h2>
      <p class="opacity-80 mb-6">お気軽にご連絡ください</p>
      <a href="mailto:info@example.com" class="btn-primary inline-block px-8 py-3 rounded-full font-semibold">
        メールで問い合わせる
      </a>
    </section>
  </main>

  <footer class="text-center py-8 text-sm opacity-60">
    © 2026 {{TITLE}}
  </footer>
</body>
</html>
