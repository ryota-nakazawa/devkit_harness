<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary: {{PRIMARY_COLOR}};
      --bg: {{BG_COLOR}};
      --text: {{TEXT_COLOR}};
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .accent { color: var(--primary); }
    .btn-primary { background: var(--primary); color: white; }
  </style>
</head>
<body class="min-h-screen">
  <div class="flex">
    <aside class="w-56 bg-white min-h-screen p-6 border-r">
      <div class="font-bold text-lg mb-8">{{TITLE}}</div>
      <nav class="space-y-2 text-sm">
        <a href="#" class="block px-3 py-2 rounded accent font-semibold">ダッシュボード</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-100">レポート</a>
        <a href="#" class="block px-3 py-2 rounded hover:bg-gray-100">設定</a>
      </nav>
    </aside>

    <main class="flex-1 p-8">
      <header class="mb-8">
        <h1 class="text-3xl font-bold">ダッシュボード</h1>
        <p class="opacity-70">{{DESCRIPTION}}</p>
      </header>

      <section class="grid md:grid-cols-3 gap-4 mb-8">
        <div class="card p-6">
          <div class="text-sm opacity-60">本日の件数</div>
          <div class="text-3xl font-bold accent mt-2">128</div>
          <div class="text-xs text-green-600 mt-1">▲ 12%</div>
        </div>
        <div class="card p-6">
          <div class="text-sm opacity-60">今月の合計</div>
          <div class="text-3xl font-bold accent mt-2">3,420</div>
          <div class="text-xs text-green-600 mt-1">▲ 8%</div>
        </div>
        <div class="card p-6">
          <div class="text-sm opacity-60">アクティブユーザー</div>
          <div class="text-3xl font-bold accent mt-2">512</div>
          <div class="text-xs text-red-600 mt-1">▼ 3%</div>
        </div>
      </section>

      <section class="card p-6">
        <h2 class="font-bold mb-4">最近のアクティビティ</h2>
        <table class="w-full text-sm">
          <thead class="text-left opacity-60 border-b">
            <tr><th class="py-2">項目</th><th>状態</th><th>更新日</th></tr>
          </thead>
          <tbody>
            {{ITEMS}}
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
